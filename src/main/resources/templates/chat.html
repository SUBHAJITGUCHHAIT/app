<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Chat</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <style>
        body {
            background: #f0f2f5;
        }

        .chat-wrapper {
            height: 90vh;
        }

        .chat-card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #ffffff;
        }

        .message {
            margin-bottom: 12px;
        }

        .self {
            text-align: right;
        }

        .bubble {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 20px;
            max-width: 75%;
            font-size: 14px;
        }

        .self .bubble {
            background-color: #0d6efd;
            color: white;
        }

        .other .bubble {
            background-color: #e9ecef;
        }

        .chat-footer {
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        /* Desktop center layout */
        @media (min-width: 768px) {
            .chat-wrapper {
                max-width: 600px;
                margin: auto;
                margin-top: 40px;
            }
        }
    </style>
</head>

<body>

<div class="container chat-wrapper">
    <div class="card shadow chat-card">

        <div class="card-header bg-primary text-white text-center">
            💬 Real-Time Chat
        </div>

        <div class="p-3 border-bottom">
            <input type="text" id="sender" class="form-control" placeholder="Enter your name">
        </div>

        <div id="chat" class="chat-body"></div>

        <div class="chat-footer">
            <div class="input-group">
                <input type="text" id="message" class="form-control" placeholder="Type message...">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>
</div>

<script>

    var socket = new SockJS('/chat');
    var stompClient = Stomp.over(socket);

    stompClient.connect({}, function () {

        stompClient.subscribe('/topic/messages', function (response) {
            var message = JSON.parse(response.body);
            showMessage(message);
        });

    });

    function sendMessage() {
        var sender = document.getElementById("sender").value;
        var content = document.getElementById("message").value;

        if(sender === "" || content === "") return;

        stompClient.send("/app/sendMessage", {}, JSON.stringify({
            sender: sender,
            content: content
        }));

        document.getElementById("message").value = "";
    }

    function showMessage(message) {

        var chat = document.getElementById("chat");
        var messageDiv = document.createElement("div");
        messageDiv.classList.add("message");

        var currentUser = document.getElementById("sender").value;

        if(message.sender === currentUser){
            messageDiv.classList.add("self");
        } else {
            messageDiv.classList.add("other");
        }

        var bubble = document.createElement("div");
        bubble.classList.add("bubble");
        bubble.innerText = message.sender + ": " + message.content;

        messageDiv.appendChild(bubble);
        chat.appendChild(messageDiv);

        chat.scrollTop = chat.scrollHeight;
    }
    document.getElementById("message").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

</script>

</body>
</html>
